# Shared GitRepository for addon ModuleTemplates (CDI, KubeVirt, etc.)
# All addon components deploy from this repo's config/addons/gitrepository/*/deploy paths.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: otterscale-repository
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/otterscale/module-operator
  ref:
    tag: v0.9.0-beta.3
