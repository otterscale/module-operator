# ModuleTemplate — KubeVirt v1.8.0-rc.0
# Uses FluxCD Kustomization. Deploy CDI first.
apiVersion: module.otterscale.io/v1alpha1
kind: ModuleTemplate
metadata:
  name: kubevirt
spec:
  namespace: kubevirt

  description: >-
    KubeVirt v1.8.0-rc.0 — enables Kubernetes to manage VMs natively.
    Requires CDI for VM disk image import.

  kustomization:
    interval: 30m
    prune: true
    sourceRef:
      kind: GitRepository
      name: otterscale-module-operator
      namespace: flux-system
    path: config/addons/gitrepository/kubevirt/deploy
