apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Deploy order: base → istiod → gateway
# Ensure istio-base is ready before istiod (FluxCD reconciles independently;
# consider applying in sequence or using dependsOn if needed).
resources:
  - helmrepository.yaml
  - moduletemplate-base.yaml
  - moduletemplate-istiod.yaml
  - moduletemplate-gateway.yaml
  - module-base.yaml
  - module-istiod.yaml
  - module-gateway.yaml
