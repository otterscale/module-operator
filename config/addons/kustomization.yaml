apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Addons — Helm-based (charts) + Git-based (CDI, KubeVirt, etc.)
#
# One-shot: kubectl apply -k config/addons/
# Individual: kubectl apply -k config/addons/helmrepository/ or config/addons/gitrepository/
resources:
  - helmrepository/
  - gitrepository/
