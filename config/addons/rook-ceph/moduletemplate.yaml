# ModuleTemplate — Rook-Ceph Operator v1.19.2 (Phase 1: Operator only)
# Uses FluxCD Kustomization. Phase 2: Apply rook-ceph-cluster Module for CephCluster.
apiVersion: module.otterscale.io/v1alpha1
kind: ModuleTemplate
metadata:
  name: rook-ceph
spec:
  namespace: rook-ceph

  description: >-
    Rook-Ceph Operator v1.19.2 — CRDs, Operator Deployment. Create CephCluster separately via rook-ceph-cluster Module.

  kustomization:
    interval: 30m
    prune: true
    sourceRef:
      kind: GitRepository
      name: otterscale-module-operator
      namespace: flux-system
    path: config/addons/rook-ceph/deploy
