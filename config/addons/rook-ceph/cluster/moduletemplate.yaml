# ModuleTemplate — Rook-Ceph CephCluster (Phase 2)
# Apply AFTER rook-ceph Operator is ready: kubectl -n rook-ceph rollout status deploy/rook-ceph-operator
apiVersion: module.otterscale.io/v1alpha1
kind: ModuleTemplate
metadata:
  name: rook-ceph-cluster
spec:
  namespace: rook-ceph

  description: >-
    Rook-Ceph CephCluster CR — Phase 2. Edit cluster/deploy for production (storage.nodes, useAllDevices: false).

  kustomization:
    interval: 30m
    prune: true
    sourceRef:
      kind: GitRepository
      name: otterscale-module-operator
      namespace: flux-system
    path: config/addons/rook-ceph/cluster/deploy
