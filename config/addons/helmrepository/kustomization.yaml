apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ModuleTemplate + HelmRepository only (no Module CRs).
# Used by build-installer to generate dist/install.yaml
#
# Included: gpu-operator, hami, prometheus, istio, llm-d-infra
# Order: HelmRepository first (sources), then ModuleTemplate
resources:
  - gpu-operator/helmrepository.yaml
  - gpu-operator/moduletemplate.yaml
  - hami/helmrepository.yaml
  - hami/moduletemplate.yaml
  - prometheus/helmrepository.yaml
  - prometheus/moduletemplate.yaml
  - istio/helmrepository.yaml
  - istio/moduletemplate-base.yaml
  - istio/moduletemplate-istiod.yaml
  - istio/moduletemplate-gateway.yaml
  - llm-d-infra/helmrepository.yaml
  - llm-d-infra/moduletemplate.yaml
