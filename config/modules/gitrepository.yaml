# Shared GitRepository for addon ModuleTemplates (CDI, KubeVirt, etc.)
# All addon components deploy from this repo's config/modules/*/deploy paths.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: otterscale-module-operator
  namespace: otterscale-system
spec:
  interval: 1h
  url: https://github.com/otterscale/module-operator
  ref:
    tag: MODULE_OPERATOR_VERSION
