# ModuleTemplate — NVIDIA GPU Operator blueprint
#
# Deploys NVIDIA GPU Operator for driver, DCGM, DCGM Exporter, Node Status Exporter.
# Device plugin and vGPU are disabled (use HAMI for GPU sharing).
#
# Apply:
#   kubectl apply -f moduletemplate.yaml
apiVersion: module.otterscale.io/v1alpha1
kind: ModuleTemplate
metadata:
  name: gpu-operator
spec:
  namespace: gpu-operator

  description: >-
    Deploys NVIDIA GPU Operator (driver 580.x, DCGM, DCGM Exporter, Node Status Exporter).
    Device plugin disabled for use with HAMI vGPU.

  helmRelease:
    interval: 30m

    chart:
      spec:
        chart: gpu-operator
        version: "__GPU_OPERATOR_VERSION__"
        sourceRef:
          kind: HelmRepository
          name: nvidia-gpu-operator
          namespace: otterscale-system
        interval: 24h

    install:
      remediation:
        retries: 3

    upgrade:
      remediation:
        retries: 3
      force: false

    timeout: 30m

    values:
      cdi:
        enabled: false

      driver:
        enabled: true
        version: "580.105.08"
        upgradePolicy:
          autoUpgrade: false

      # Offline version
      # driver:
      #   version: "580"
      #   usePrecompiled: true

      devicePlugin:
        enabled: false

      operator:
        cleanupCRD: true
        upgradeCRD: false

      dcgm:
        enabled: true

      dcgmExporter:
        enabled: true
        serviceMonitor:
          enabled: true

      nodeStatusExporter:
        enabled: true

      vgpuDeviceManager:
        enabled: false
