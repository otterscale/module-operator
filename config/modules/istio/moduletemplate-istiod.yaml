# ModuleTemplate — Istiod (Istio control plane)
#
# Installs Istiod control plane. Requires istio-base to be installed first.
# See: https://istio.io/latest/docs/setup/install/helm/
#
# Apply order: base → istiod
apiVersion: module.otterscale.io/v1alpha1
kind: ModuleTemplate
metadata:
  name: istiod
spec:
  namespace: istio-system

  description: >-
    Installs Istiod (Istio control plane / discovery server).

  helmRelease:
    interval: 30m

    dependsOn:
      - name: istio-base
        namespace: istio-system

    chart:
      spec:
        chart: istiod
        version: "__ISTIO_VERSION__"
        sourceRef:
          kind: HelmRepository
          name: istio
          namespace: otterscale-system
        interval: 24h

    install:
      remediation:
        retries: 3

    upgrade:
      remediation:
        retries: 3
      force: false

    timeout: 15m

    values:
      env:
        ENABLE_GATEWAY_API_INFERENCE_EXTENSION: "true"
