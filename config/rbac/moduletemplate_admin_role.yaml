# This rule is not used by the project module-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over module.otterscale.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: module-operator
    app.kubernetes.io/managed-by: kustomize
  name: moduletemplate-admin-role
rules:
- apiGroups:
  - module.otterscale.io
  resources:
  - moduletemplates
  verbs:
  - "*"
- apiGroups:
  - module.otterscale.io
  resources:
  - moduletemplates/status
  verbs:
  - get
