---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - create
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - module.otterscale.io
  resources:
  - moduleclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - module.otterscale.io
  resources:
  - modules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - module.otterscale.io
  resources:
  - modules/finalizers
  verbs:
  - update
- apiGroups:
  - module.otterscale.io
  resources:
  - modules/status
  verbs:
  - get
  - patch
  - update
