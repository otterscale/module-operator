# This rule is not used by the project module-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the module.otterscale.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: module-operator
    app.kubernetes.io/managed-by: kustomize
  name: moduletemplate-editor-role
rules:
- apiGroups:
  - module.otterscale.io
  resources:
  - moduletemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - module.otterscale.io
  resources:
  - moduletemplates/status
  verbs:
  - get
